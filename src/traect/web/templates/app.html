<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1D1E20">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <title>-traect</title>
    <link rel="stylesheet" href="/tokens.css">
    <link rel="stylesheet" href="/typography.css">
    <link rel="stylesheet" href="/layout.css">
    <link rel="stylesheet" href="/components.css">
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <h1>-traect</h1>
          <div class="meta" id="headline"></div>
        </div>
      </header>

      <nav aria-label="Sections" id="main-nav">
        <button class="tab" type="button" data-view="current" aria-selected="true">Current</button>
        <button class="tab" type="button" data-view="timeline" aria-selected="false">Timeline</button>
        <button class="tab" type="button" data-view="domains" aria-selected="false">Domains</button>
      </nav>

      <main>
        <section id="current-view">
          <h2 class="meta week-heading" id="week-meta"></h2>

          <section class="current-tradeoff hidden" id="current-tradeoff" aria-labelledby="current-tradeoff-title">
            <h3 class="section-title" id="current-tradeoff-title">This week</h3>
            <div id="current-tradeoff-content"></div>
          </section>

          <section class="current-groups" id="current-groups"></section>

          <div class="actions actions-left">
            <button class="secondary" type="button" id="edit-review">Edit review</button>
          </div>
        </section>

        <section id="timeline-view" class="timeline hidden" aria-labelledby="timeline-title">
          <div>
            <h2 class="view-title" id="timeline-title">Timeline</h2>
            <p class="hint">Saved weekly snapshots in reverse chronological order.</p>
          </div>
          <div class="status" id="timeline-status" role="status"></div>
          <div class="timeline-entries" id="timeline-entries"></div>
        </section>

        <section id="edit-view" class="hidden">
          <div class="view-title">Edit review</div>
          <p class="hint review-intro">Describe what actually happened this week. This is a snapshot, not a plan.</p>

          <form id="review-form" class="split">
            <section class="week-summary">
              <h3 class="section-title">Weekly trade-off</h3>
              <div class="summary-grid">
                <label>Main focus
                  <select name="focus_domain_id"></select>
                </label>
                <label>What gave way
                  <select name="sacrificed_domain_id"></select>
                </label>
                <label>Why
                  <input type="text" name="sacrifice_reason" maxlength="240" placeholder="What caused this trade-off?">
                </label>
                <label>Week notes
                  <textarea name="notes" placeholder="Anything else about the week"></textarea>
                </label>
              </div>
            </section>

            <section class="domain-review">
              <div>
                <h3 class="section-title">Domains</h3>
                <p class="hint">Record the attention each domain received and its condition now.</p>
              </div>
              <div class="domains" id="review-domains"></div>
            </section>

            <div class="actions">
              <button class="secondary" type="button" id="back-to-current">Back</button>
              <button class="primary" type="submit">Save</button>
            </div>
            <div class="status" id="review-status"></div>
          </form>
        </section>

        <section id="manage-view" class="manage hidden">
          <div class="toolbar">
            <h3 class="section-title">Active</h3>
            <button class="ghost" type="button" id="add-active-domain">Add Domain</button>
          </div>
          <div id="manage-domains" class="domain-list"></div>
          <div class="status" id="manage-status"></div>

          <section>
            <h3 class="section-title">Archived</h3>
            <div id="archived-domains" class="domain-list"></div>
          </section>
        </section>
      </main>
    </main>
    <script>
      window.TRAECT_API_BASE = "";
    </script>
    <script src="/app.js?v=20260717-timeline" type="module"></script>
  </body>
</html>
