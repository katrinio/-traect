<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1D1E20">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <title>-traect</title>
    <link rel="stylesheet" href="/tokens.css">
    <link rel="stylesheet" href="/typography.css">
    <link rel="stylesheet" href="/layout.css">
    <link rel="stylesheet" href="/components.css">
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <h1>-traect</h1>
          <div class="meta" id="headline">Workspace setup</div>
        </div>
        <div class="meta" id="save-state"></div>
      </header>

      <main>
        <section id="setup-view" class="setup">
          <div>
            <h2 class="section-title">Workspace setup</h2>
            <p class="hint">A Workspace holds the areas you want to track. Keep the names neutral so the same structure can work for Life, Projects, Career, or something else later.</p>
          </div>
          <form id="setup-form" class="split">
            <label>Workspace name
              <input name="workspace_name" type="text" autocomplete="off" required>
            </label>
            <div>
              <div class="toolbar">
                <h3 class="section-title">Initial Domains</h3>
                <button class="ghost" type="button" id="add-domain">Add Domain</button>
              </div>
              <div id="setup-domains" class="domains"></div>
            </div>
            <div class="status" id="setup-status"></div>
            <div class="actions actions-left">
              <button class="primary" type="submit">Create Workspace</button>
            </div>
          </form>
        </section>
      </main>
    </main>
    <script>
      window.TRAECT_API_BASE = "";
    </script>
    <script src="/app.js?v=20260717-timeline" type="module"></script>
  </body>
</html>
