name: 🚀 Deploy Traect

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'migrations/**'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'alembic.ini'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'README.md'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-traect
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/katrinio/traect:latest

      - name: Deploy Traect via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd ~/projects/traect

            git fetch origin main
            git reset --hard origin/main

            docker compose pull traect
            docker compose up -d --remove-orphans

            for i in {1..10}; do
              if curl --fail --silent --show-error http://127.0.0.1:8012/health; then
                docker compose ps
                docker image prune -f
                exit 0
              fi
              echo "Waiting for Traect healthcheck..."
              sleep 3
            done

            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=100 traect
            exit 1
